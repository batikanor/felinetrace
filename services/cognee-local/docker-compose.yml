name: felinetrace-local-cognee

services:
  cognee:
    image: cognee/cognee@sha256:35cbdc11df5c456f33712b012c37e792ed7e0c57a0a61b30227849c6f748f1fb
    container_name: felinetrace-cognee
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      ENV: local
      LOG_LEVEL: INFO
      HTTP_API_HOST: 0.0.0.0
      HTTP_API_PORT: 8000
      REQUIRE_AUTHENTICATION: "false"
      ENABLE_BACKEND_ACCESS_CONTROL: "false"
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:43205"
      DATA_ROOT_DIRECTORY: /var/lib/cognee/data
      SYSTEM_ROOT_DIRECTORY: /var/lib/cognee/system
      CACHE_ROOT_DIRECTORY: /var/lib/cognee/cache
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - cognee-data:/var/lib/cognee
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 7GB

  health-adapter:
    image: node:22-alpine
    container_name: felinetrace-cognee-health
    restart: unless-stopped
    environment:
      PORT: 43110
      COGNEE_LOCAL_URL: http://cognee:8000
      OLLAMA_LOCAL_URL: http://host.docker.internal:11434
      COGNEE_BUILD: main@35cbdc1
      COGNEE_LLM_MODEL: llama3.1:8b
      COGNEE_EMBEDDING_MODEL: nomic-embed-text:latest
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      cognee:
        condition: service_healthy
    command: ["node", "/app/health-adapter.mjs"]
    volumes:
      - ./health-adapter.mjs:/app/health-adapter.mjs:ro
    ports:
      - "127.0.0.1:43110:43110"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:43110/health"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  cognee-data:
    name: felinetrace-cognee-data
